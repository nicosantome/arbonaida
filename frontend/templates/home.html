<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbonaida - Reservas</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/date-picker.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


    <style>

    </style>

</head>
<body>
<div class="wrapper">
    <div class="main">
        <div class="personas">
            <h2 class="subtitle">Personas</h2>
            <ul class="guest-list">
                <li>
                    <button class="btn-personas">2</button>
                </li>
                <li>
                    <button class="btn-personas">3</button>
                </li>
                <li>
                    <button class="btn-personas">4</button>
                </li>
                <li>
                    <button class="btn-personas">5</button>
                </li>
                <li>
                    <button class="btn-personas">6</button>
                </li>
                <li>
                    <button class="btn-personas btn-capacidad">...</button>
                </li>
            </ul>
        </div>
        <div class="fechas">
             <h2 class="subtitle">Fechas</h2>
            <ul class="dates-list">

            </ul>
        </div>
        <div class="container-calendar hidden">
            <div class="button-container-calendar">
                <button id="previous">&#8249;</button>
                <button id="next">&#8250;</button>
                <h3 id="monthHeader"></h3>
                <p id="yearHeader"></p>
            </div>

            <table class="table-calendar" id="calendar">
                <thead id="thead-month"></thead>
                <tbody id="calendar-body"></tbody>
            </table>

            <div class="footer-container-calendar">
                <label for="month">Jump To: </label>
                <select id="month">
                    <option value=0>Jan</option>
                    <option value=1>Feb</option>
                    <option value=2>Mar</option>
                    <option value=3>Apr</option>
                    <option value=4>May</option>
                    <option value=5>Jun</option>
                    <option value=6>Jul</option>
                    <option value=7>Aug</option>
                    <option value=8>Sep</option>
                    <option value=9>Oct</option>
                    <option value=10>Nov</option>
                    <option value=11>Dec</option>
                </select>
                <select id="year"></select>
                <p id="date-picked"></p>
            </div>
        </div>
        <div class="seccion-servicio">
            <button class="btn-servicio">Comida</button>
            <button class="btn-servicio">Cena</button>
        </div>
    </div>
</div>

</body>
<script src="{{ url_for('static', filename='js/date-picker.js') }}"></script>
<script src="{{ url_for('static', filename='js/moment.js') }}"></script>
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
</html>
