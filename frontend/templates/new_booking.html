<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Booking</title>
</head>
<body>
    <h1>New Booking</h1>
    <form method="POST" action="/create_booking">
        <!-- Campo de número de personas -->
        <label for="people">Number of People:</label>
        <input type="number" id="people" name="people" value="2" min="1" required><br><br>

        <!-- Campo de fecha -->
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required><br><br>

        <!-- Campo de hora -->
        <label for="time">Time:</label>
        <input type="time" id="time" name="time" min="13:00" max="23:00" step="900" required><br><br>

        <!-- Campo de ubicación (interior/exterior) -->
        <label>Indoor/Outdoor:</label><br>
        <input type="radio" id="indoor" name="location" value="indoor" required>
        <label for="indoor">Indoor</label><br>
        <input type="radio" id="outdoor" name="location" value="outdoor" required>
        <label for="outdoor">Outdoor</label><br><br>

        <!-- Botón de envío -->
        <input type="submit" value="Submit">
    </form>
    <!-- Enlace al archivo JavaScript externo -->
    <script src="{{ url_for('static', filename='js/new_booking.js') }}"></script>
</body>
</html>
